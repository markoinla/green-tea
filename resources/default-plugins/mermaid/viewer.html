<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mermaid Viewer</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: #1f2937;
        background: #ffffff;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      #diagram {
        flex: 1 1 auto;
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      #diagram svg {
        max-width: 100%;
        height: auto;
      }
      #editor {
        flex: 0 0 auto;
        border-top: 1px solid #e5e7eb;
        display: none;
      }
      #editor.visible {
        display: block;
      }
      textarea {
        width: 100%;
        height: 160px;
        border: 0;
        resize: vertical;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        line-height: 1.5;
        outline: none;
        color: #111827;
      }
      .error {
        color: #b91c1c;
        font-family: ui-monospace, monospace;
        font-size: 13px;
        white-space: pre-wrap;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="diagram"></div>
      <div id="editor">
        <textarea id="source" spellcheck="false" placeholder="graph TD; A--&gt;B;"></textarea>
      </div>
    </div>

    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs'

      mermaid.initialize({ startOnLoad: false, securityLevel: 'strict' })

      const diagramEl = document.getElementById('diagram')
      const editorEl = document.getElementById('editor')
      const sourceEl = document.getElementById('source')

      // The host bridges file contents as plain text strings (readArtifactText /
      // writeArtifact), so `bytes` on both gt:init and gt:save is a UTF-8 string,
      // not a Uint8Array — no Text{En,De}coder needed.
      let editable = false
      let renderSeq = 0

      function post(msg) {
        window.parent.postMessage(msg, '*')
      }

      async function render(source) {
        const seq = ++renderSeq
        try {
          const { svg } = await mermaid.render('gt-mermaid-' + seq, source)
          if (seq !== renderSeq) return
          diagramEl.innerHTML = svg
        } catch (err) {
          if (seq !== renderSeq) return
          diagramEl.innerHTML = ''
          const pre = document.createElement('div')
          pre.className = 'error'
          pre.textContent = String((err && err.message) || err)
          diagramEl.appendChild(pre)
        }
      }

      let saveTimer = null
      function scheduleSave(source) {
        if (saveTimer) clearTimeout(saveTimer)
        saveTimer = setTimeout(() => {
          post({ type: 'gt:save', bytes: source })
        }, 500)
      }

      sourceEl.addEventListener('input', () => {
        const source = sourceEl.value
        render(source)
        scheduleSave(source)
      })

      document.addEventListener('selectionchange', () => {
        const sel = window.getSelection()
        const text = sel ? sel.toString().trim() : ''
        if (text) post({ type: 'gt:quote', text })
      })

      window.addEventListener('message', (event) => {
        const msg = event.data
        if (!msg || typeof msg !== 'object') return
        if (msg.type === 'gt:init') {
          editable = Boolean(msg.editable)
          const source = typeof msg.bytes === 'string' ? msg.bytes : ''
          sourceEl.value = source
          if (editable) editorEl.classList.add('visible')
          render(source)
        }
      })

      post({ type: 'gt:ready' })
    </script>
  </body>
</html>
